name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *" # Se ejecuta todos los dias a medianoche
  workflow_dispatch: # Permite correrlo manualmente desde Actions

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Santlas09
          template: classic
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          config_timezone: America/Bogota
          config_order: base.header, base.activity+community, base.repositories, languages
